<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Sign-In Successful — Lazy Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Urbanist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Urbanist', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: hsl(0, 0%, 100%);
      color: hsl(220, 30%, 10%);
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .logo {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 3rem;
      color: hsl(220, 30%, 10%);
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      color: hsl(145, 60%, 45%);
    }
    h1 {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 1.875rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.2;
      color: hsl(220, 30%, 10%);
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: hsl(0, 0%, 40%);
    }
  </style>
</head>
<body>
  <div class="logo">🗺️ Lazy Map</div>
  <div class="container">
    <span class="icon">✓</span>
    <h1>Authentication Successful</h1>
    <p>You can close this window.</p>
  </div>
  <script>
    (function() {
      'use strict';

      if (window.opener) {
        try {
          const allowedOrigins = {{ALLOWED_ORIGINS}};
          const message = {
            type: 'oauth-success',
            provider: '{{PROVIDER}}',
            user: {
              id: '{{USER_ID}}',
              email: '{{USER_EMAIL}}',
              username: '{{USER_USERNAME}}'
            }
          };

          // Send message to each allowed origin
          allowedOrigins.forEach(function (origin) {
            window.opener.postMessage(message, origin);
          });

          // Close window after a short delay to ensure message is received
          setTimeout(function() {
            window.close();
          }, 500);
        } catch (error) {
          console.error('Failed to send OAuth success message:', error);
        }
      }
    })();
  </script>
</body>
</html>
